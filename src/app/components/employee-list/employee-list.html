<h2>Employee List</h2>

<button mat-raised-button color="primary" routerLink="/add-employee">
  Add Employee
</button>

<br><br>
<label>Filter by Department:</label>

<select [(ngModel)]="selectedDepartment">
  <option value="All">All</option>
  <option value="IT">IT</option>
  <option value="HR">HR</option>
  <option value="QA">QA</option>
</select>

<br><br>
<table mat-table [dataSource]="employees | departmentFilter:selectedDepartment" class="mat-elevation-z8">

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let emp">
      <span (click)="viewEmployee(emp.id)" style="cursor:pointer; color:blue">
        {{ emp.name }}
      </span>
    </td>
  </ng-container>

  <!-- Role Column -->
  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Role</th>
    <td mat-cell *matCellDef="let emp">{{ emp.role }}</td>
  </ng-container>

  <!-- Department Column -->
  <ng-container matColumnDef="department">
    <th mat-header-cell *matHeaderCellDef>Department</th>
    <td mat-cell *matCellDef="let emp">{{ emp.department }}</td>
  </ng-container>

  <!-- Salary Column -->
  <ng-container matColumnDef="salary">
    <th mat-header-cell *matHeaderCellDef>Salary</th>
    <td mat-cell *matCellDef="let emp">{{ emp.salary | currency:'INR' }}</td>
  </ng-container>

  <!-- Action Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Action</th>
    <td mat-cell *matCellDef="let emp">
      <button mat-button color="primary" (click)="viewEmployee(emp.id)">
        View
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
 <tr mat-row
    *matRowDef="let row; columns: displayedColumns;"
    [appHighlightSalary]="row.salary">
</tr>
</table>
